<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PieDevs Desktop</title>

<style>
body{
    margin:0;
    font-family:Tahoma,sans-serif;
    overflow:hidden;
    user-select:none;
    background:url("Icons/background.png") no-repeat center center fixed;
    background-size:cover;
}

#bootScreen{
    position:fixed;
    top:0;left:0;
    width:100%;height:100%;
    background:url("Icons/BootScreen.png") no-repeat center center;
    background-size:cover;
    z-index:99999;
    opacity:1;
    transition:opacity 1s ease;
}

#desktop{
    padding:20px;
    color:white;
    display:flex;
    flex-direction:column;
    position:relative;
    height:calc(100vh - 40px);
}

.icon{
    width:80px;
    text-align:center;
    margin-bottom:20px;
    cursor:pointer;
}
.icon:hover{
    background:rgba(255,255,255,0.2);
    border:1px dotted white;
}
.icon img{
    width:48px;
    height:48px;
    pointer-events:none;
}
.icon span{
    display:block;
    margin-top:5px;
    font-size:14px;
    pointer-events:none;
    text-shadow:1px 1px 2px black;
}

.selection-box{
    position:absolute;
    border:1px solid #3399ff;
    background:rgba(51,153,255,0.25);
    pointer-events:none;
    display:none;
}

.taskbar{
    position:fixed;
    bottom:0;
    width:100%;
    height:40px;
    background:linear-gradient(to bottom,#3a6ea5 0%,#245edb 40%,#1b3f91 100%);
    display:flex;
    align-items:center;
    padding:0 5px;
    border-top:1px solid #0c2c84;
    z-index:1000;
}

.start-btn{
    background:linear-gradient(to bottom,#5fd35f 0%,#3cb043 50%,#2e8b2e 100%);
    color:white;
    font-weight:bold;
    font-style:italic;
    padding:5px 18px;
    border-radius:0 15px 15px 0;
    border:1px solid #1e6f1e;
    cursor:pointer;
}
.start-btn.active{
    filter:brightness(1.2);
}

.clock{
    margin-left:auto;
    margin-right:10px;
    color:white;
    font-weight:bold;
    cursor:pointer;
    padding:5px;
}
.clock:hover{
    background:rgba(255,255,255,0.1);
}

.start-menu{
    position:fixed;
    bottom:40px;
    left:2px;
    width:300px;
    background:#fff;
    border:2px solid #245edb;
    border-radius:8px 8px 0 0;
    box-shadow:4px 4px 15px rgba(0,0,0,0.5);
    transform:translateY(20px);
    opacity:0;
    pointer-events:none;
    transition:all 0.2s ease;
    z-index:2000;
}
.start-menu.open{
    transform:translateY(0);
    opacity:1;
    pointer-events:auto;
}
.start-header{
    background:linear-gradient(to bottom,#1b5ad3,#3a83e6);
    padding:10px;
    color:white;
}
.menu-item{
    padding:8px;
    font-size:12px;
    cursor:pointer;
}
.menu-item:hover{
    background:#316ac5;
    color:white;
}

.window{
    width:400px;
    background:#ece9d8;
    border:3px solid #245edb;
    border-radius:8px 8px 0 0;
    position:absolute;
    top:100px;
    left:100px;
    display:none;
    box-shadow:5px 5px 15px rgba(0,0,0,0.6);
}

.title-bar{
    background:linear-gradient(to right,#245edb,#3a6ea5);
    color:white;
    padding:5px;
    font-weight:bold;
    display:flex;
    justify-content:space-between;
    cursor:move;
}

.close-btn{
    background:#c72015;
    padding:2px 8px;
    cursor:pointer;
    border:1px solid white;
    border-radius:3px;
}

.window-content{
    padding:15px;
}

.window-notepad .window-content{
    background:white;
    padding:0;
}

.notepad-area{
    width:100%;
    height:250px;
    border:none;
    outline:none;
    font-family:monospace;
    font-size:13px;
    padding:5px;
    box-sizing:border-box;
}

.project-icon{
    display:inline-block;
    width:60px;
    margin:5px;
    text-align:center;
    cursor:pointer;
}
.project-icon img{
    width:48px;
    height:48px;
}
.project-icon span{
    display:block;
    font-size:12px;
    color:black;
}


.ms-container {
    background: #bdbdbd;
    padding: 6px;
    border: 3px outset #eee;
    display: inline-block;
    margin: 0 auto;
}
.ms-header {
    background: #bdbdbd;
    border: 2px inset #eee;
    padding: 4px 8px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 6px;
}
.ms-digit {
    background: black;
    color: #ff0000;
    font-family: 'Courier New', Courier, monospace;
    font-weight: bold;
    font-size: 22px;
    padding: 2px 5px;
    border: 1px inset #555;
    min-width: 40px;
    text-align: center;
}
.ms-face {
    width: 30px;
    height: 30px;
    border: 2px outset #eee;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 20px;
    cursor: pointer;
    background: #bdbdbd;
}
.ms-face:active { border: 2px inset #eee; }
.ms-grid {
    display: grid;
    grid-template-columns: repeat(10, 24px);
    grid-gap: 1px;
    border: 2px inset #eee;
    background-color: #7b7b7b;
}
.ms-cell {
    width: 24px;
    height: 24px;
    background: #bdbdbd;
    border: 2px outset #fff;
    display: flex;
    justify-content: center;
    align-items: center;
    font-weight: bold;
    font-size: 14px;
    cursor: pointer;
}
.ms-cell.revealed { border: 1px solid #7b7b7b; background: #bdbdbd; }
.ms-cell.mine-hit { background-color: red; }
</style>
</head>

<body>

<div id="bootScreen"></div>

<div id="desktop">
    <div class="selection-box" id="selectionBox"></div>
</div>

<div id="startMenu" class="start-menu">
    <div class="start-header">Administrator</div>
    <div class="menu-item" onclick="openWindow('window0');closeStartMenu();playClickSound()">Info</div>
    <div class="menu-item" onclick="openWindow('window1');loadProjects('window1');closeStartMenu();playClickSound()">Projects</div>
    <div class="menu-item" onclick="openWindow('window2');closeStartMenu();playClickSound()">Notepad</div>
    <div class="menu-item" onclick="openWindow('window3');initMinesweeper();closeStartMenu();playClickSound()">Minesweeper</div>
</div>

<div class="taskbar">
    <div class="start-btn" id="startBtn">Start</div>
    <div class="clock" id="clock"></div>
</div>

<audio id="clickAudio" src="Sounds/click.mp3" preload="auto"></audio>

<script>
window.addEventListener("load",()=>{
    const boot=document.getElementById("bootScreen");
    setTimeout(()=>{
        boot.style.opacity="0";
        setTimeout(()=>boot.remove(),1000);
    },2000);
});

let zIndexCounter=10;
let clockClicks=0;
let bubblesActive=false;

const desktop=document.getElementById("desktop");
const selectionBox=document.getElementById("selectionBox");
const startMenu=document.getElementById("startMenu");
const startBtn=document.getElementById("startBtn");
const clock=document.getElementById("clock");
const clickAudio=document.getElementById("clickAudio");

function playClickSound(){
    const clone=clickAudio.cloneNode();
    clone.volume=0.4;
    clone.playbackRate=0.95+Math.random()*0.1;
    clone.play().catch(()=>{});
}

function openStartMenu(){
    startMenu.classList.add("open");
    startBtn.classList.add("active");
}
function closeStartMenu(){
    startMenu.classList.remove("open");
    startBtn.classList.remove("active");
}
startBtn.onclick=(e)=>{
    e.stopPropagation();
    startMenu.classList.contains("open")?closeStartMenu():openStartMenu();
    playClickSound();
};
document.addEventListener("click",e=>{
    if(!startMenu.contains(e.target)&&!startBtn.contains(e.target)){
        closeStartMenu();
    }
});

const folders=[
    {name:"Info",icon:"Icons/folder.png",content:"Welcome to my first website! This site is to show my latest projects and my HTML skills, I hope you like it!"},
    {name:"Projects",icon:"Icons/folder.png",content:""},
    {name:"Notepad",icon:"Icons/Notepad.png",content:"<textarea class='notepad-area'>I dare you to press the time 10 times!</textarea>",notepad:true},
    {name:"Minesweeper",icon:"Icons/MineSweeper.png",content:"<div id='ms-root'></div>",ms:true}
];

folders.forEach((f,i)=>{
    const id="window"+i;
    const icon=document.createElement("div");
    icon.className="icon";
    icon.innerHTML=`<img src="${f.icon}"><span>${f.name}</span>`;
    icon.onclick=()=>{
        openWindow(id);
        if(f.name==="Projects") loadProjects(id);
        if(f.name==="Minesweeper") initMinesweeper();
        playClickSound();
    };
    desktop.appendChild(icon);

    const win=document.createElement("div");
    win.className="window"+(f.notepad?" window-notepad":"");
    win.id=id;
    win.innerHTML=`
        <div class="title-bar">
            ${f.name}
            <div class="close-btn">X</div>
        </div>
        <div class="window-content" id="${id}-content">${f.content}</div>`;
    document.body.appendChild(win);

    win.querySelector(".close-btn").onclick=()=>{
        closeWindow(id);
        playClickSound();
    };

    makeDraggable(win);
});

const projects=[
    {name:"Pixel Monkeys",icon:"Icons/pixel_monkeys.png",content:"PixelMonkeys is my main project, it is a VR game that uses gorilla locomotion, it's free on the Meta store!"},
    {name:"this is not a Rick Roll",icon:"Icons/rick.png",content:"Never gonna give you up..."}
];

function loadProjects(id){
    const container=document.getElementById(id+"-content");
    container.innerHTML="";
    projects.forEach(p=>{
        const div=document.createElement("div");
        div.className="project-icon";
        div.innerHTML=`<img src="${p.icon}"><span>${p.name}</span>`;
        div.onclick=()=>{
            openProjectWindow(p);
            playClickSound();
        };
        container.appendChild(div);
    });
}

function openProjectWindow(p){
    const winId="proj-"+p.name.replace(/\s/g,'');
    let win=document.getElementById(winId);
    if(!win){
        win=document.createElement("div");
        win.className="window";
        win.id=winId;
        win.innerHTML=`
            <div class="title-bar">
                ${p.name}
                <div class="close-btn">X</div>
            </div>
            <div class="window-content">${p.content}</div>`;
        document.body.appendChild(win);

        win.querySelector(".close-btn").onclick=()=>{
            closeWindow(winId);
            playClickSound();
        };

        makeDraggable(win);
    }
    win.style.display="block";
    win.style.zIndex=++zIndexCounter;
}

function openWindow(id){
    const w=document.getElementById(id);
    w.style.display="block";
    w.style.zIndex=++zIndexCounter;
}
function closeWindow(id){
    document.getElementById(id).style.display="none";
}

function makeDraggable(win){
    const bar=win.querySelector(".title-bar");
    let offsetX=0,offsetY=0,dragging=false;

    bar.addEventListener("mousedown",(e)=>{
        dragging=true;
        offsetX=e.clientX-win.offsetLeft;
        offsetY=e.clientY-win.offsetTop;
        win.style.zIndex=++zIndexCounter;
        e.preventDefault(); 
    });

    document.addEventListener("mousemove",(e)=>{
        if(!dragging) return;
        win.style.left=e.clientX-offsetX+"px";
        win.style.top=e.clientY-offsetY+"px";
    });

    document.addEventListener("mouseup",()=>dragging=false);
}


let msGrid=[], msTimer=0, msInt=null, msOver=false, msFlags=0;
const msR=10, msC=10, msM=12;

function initMinesweeper(){
    clearInterval(msInt); msTimer=0; msOver=false; msFlags=0; msInt=null;
    const cont=document.getElementById("window3-content");
    cont.style.textAlign = "center";
    cont.innerHTML=`<div class="ms-container"><div class="ms-header"><div class="ms-digit" id="ms-mine-count">012</div><div class="ms-face" id="ms-face" onclick="initMinesweeper()">☺︎</div><div class="ms-digit" id="ms-timer">000</div></div><div id="ms-grid" class="ms-grid"></div></div>`;
    const gridEl=document.getElementById("ms-grid");
    gridEl.oncontextmenu=e=>e.preventDefault();
    msGrid=[];
    for(let r=0;r<msR;r++){
        msGrid[r]=[];
        for(let c=0;c<msC;c++){
            const cell=document.createElement("div");
            cell.className="ms-cell";
            cell.onclick=()=>reveal(r,c);
            cell.oncontextmenu=e=>{e.preventDefault();flag(r,c);};
            gridEl.appendChild(cell);
            msGrid[r][c]={mine:false,rev:false,flg:false,cnt:0,el:cell};
        }
    }
    let p=0; while(p<msM){
        let rr=Math.floor(Math.random()*msR), cc=Math.floor(Math.random()*msC);
        if(!msGrid[rr][cc].mine){msGrid[rr][cc].mine=true; p++;}
    }
    for(let r=0;r<msR;r++){
        for(let c=0;c<msC;c++){
            if(!msGrid[r][c].mine){
                let ct=0;
                for(let i=-1;i<=1;i++)for(let j=-1;j<=1;j++)if(msGrid[r+i]&&msGrid[r+i][c+j]&&msGrid[r+i][c+j].mine)ct++;
                msGrid[r][c].cnt=ct;
            }
        }
    }
}

function reveal(r,c){
    if(msOver||!msGrid[r]||!msGrid[r][c]||msGrid[r][c].rev||msGrid[r][c].flg)return;
    if(!msInt)msInt=setInterval(()=>{msTimer++;document.getElementById("ms-timer").innerText=String(Math.min(msTimer,999)).padStart(3,'0');},1000);
    const cell=msGrid[r][c]; cell.rev=true; cell.el.classList.add("revealed"); cell.el.style.border="1px solid #7b7b7b";
    if(cell.mine){
        cell.el.classList.add("mine-hit"); cell.el.innerText="☼"; endGame(false); return;
    }
    if(cell.cnt>0){
        cell.el.innerText=cell.cnt;
        const colors=["","blue","green","red","darkblue","brown","teal","black","gray"];
        cell.el.style.color=colors[cell.cnt];
    }else{
        for(let i=-1;i<=1;i++)for(let j=-1;j<=1;j++)reveal(r+i,c+j);
    }
    if(msGrid.flat().filter(x=>!x.mine&&!x.rev).length===0) endGame(true);
}

function flag(r,c){
    if(msOver||msGrid[r][c].rev)return;
    const cell=msGrid[r][c]; cell.flg=!cell.flg;
    msFlags+=cell.flg?1:-1;
    cell.el.innerText=cell.flg?"⚐":"";
    document.getElementById("ms-mine-count").innerText=String(Math.max(msM-msFlags,0)).padStart(3,'0');
    playClickSound();
}

function endGame(win){
    msOver=true; clearInterval(msInt);
    document.getElementById("ms-face").innerText=win?"☆":"☻";
    msGrid.flat().forEach(cell=>{if(cell.mine){cell.el.innerText="☼"; cell.el.classList.add("revealed");}});
}


let startX,startY,isSelecting=false;
desktop.addEventListener("mousedown",e=>{
    if(e.target!==desktop) return;
    isSelecting=true;
    startX=e.offsetX;
    startY=e.offsetY;
    selectionBox.style.left=startX+"px";
    selectionBox.style.top=startY+"px";
    selectionBox.style.width="0px";
    selectionBox.style.height="0px";
    selectionBox.style.display="block";
});
desktop.addEventListener("mousemove",e=>{
    if(!isSelecting) return;
    const w=e.offsetX-startX;
    const h=e.offsetY-startY;
    selectionBox.style.width=Math.abs(w)+"px";
    selectionBox.style.height=Math.abs(h)+"px";
    selectionBox.style.left=(w<0?e.offsetX:startX)+"px";
    selectionBox.style.top=(h<0?e.offsetY:startY)+"px";
});
document.addEventListener("mouseup",()=>{
    isSelecting=false;
    selectionBox.style.display="none";
});

function updateClock(){
    const now=new Date();
    clock.innerText=now.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
}
setInterval(updateClock,1000);
updateClock();

clock.onclick=()=>{
    clockClicks++;
    if(clockClicks>=10 && !bubblesActive){
        clockClicks=0;
        spawnBubbles();
        playClickSound();
    }
};

function spawnBubbles(){
    if(bubblesActive) return; 
    bubblesActive = true;
    const size = 60; 
    const bubbles = [];

    for(let i = 0; i < 10; i++){
        const b = document.createElement("img");
        b.src = "Icons/bubble.png";
        b.style.position = "fixed";
        b.style.width = size + "px";
        b.style.zIndex = 9999;
        b.style.pointerEvents = "none"; 
        document.body.appendChild(b);

        bubbles.push({
            el: b,
            x: Math.random() * (window.innerWidth - size),
            y: Math.random() * (window.innerHeight - size),
            dx: (Math.random() - 0.5) * 6, 
            dy: (Math.random() - 0.5) * 6  
        });
    }

    function animate(){
        if(!bubblesActive) return;

        bubbles.forEach(b => {
            b.x += b.dx;
            b.y += b.dy;
            if(b.x <= 0 || b.x >= window.innerWidth - size) b.dx *= -1;
            if(b.y <= 0 || b.y >= window.innerHeight - size) b.dy *= -1;

            bubbles.forEach(o => {
                if(b !== o){
                    const dist = Math.hypot(b.x - o.x, b.y - o.y);
                    if(dist < size){
                        [b.dx, o.dx] = [o.dx, b.dx];
                        [b.dy, o.dy] = [o.dy, b.dy];
                        b.x += b.dx;
                        b.y += b.dy;
                    }
                }
            });

            b.el.style.left = b.x + "px";
            b.el.style.top = b.y + "px";
        });

        requestAnimationFrame(animate);
    }
    animate();

    setTimeout(() => {
        bubblesActive = false;
        bubbles.forEach(b => {
            b.el.style.transition = "opacity 0.5s, transform 0.5s";
            b.el.style.opacity = "0";
            b.el.style.transform = "scale(1.5)";
            setTimeout(() => b.el.remove(), 500);
        });
    }, 10000);
}




document.addEventListener('contextmenu', e => e.preventDefault());


document.addEventListener('keydown', e => {
    // Disable F12
    if (e.key === "F12") {
        e.preventDefault();
    }
    // Disable Ctrl+Shift+I (Inspect), Ctrl+Shift+J (Console), Ctrl+Shift+C (Select element)
    if (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'J' || e.key === 'C')) {
        e.preventDefault();
    }
    // Disable Ctrl+U (View Source)
    if (e.ctrlKey && e.key === 'u') {
        e.preventDefault();
    }
});
</script>

</body>
</html>
